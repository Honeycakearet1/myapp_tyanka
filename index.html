<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>✨ Кристальные свидания | ИИ-тяночки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            padding: 12px;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .game-wrapper {
            max-width: 550px;
            margin: 0 auto;
            position: relative;
        }

        /* НЕОНОВЫЙ ЭФФЕКТ */
        .glass-card {
            background: rgba(12, 18, 28, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            border: 1px solid rgba(255, 200, 100, 0.25);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,240,0.05);
            transition: all 0.2s ease;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .crystal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            margin-bottom: 18px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 60px;
            border: 1px solid #ffdfaa30;
        }

        .crystal-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #1e1f2c, #0b0e16);
            padding: 6px 18px;
            border-radius: 40px;
        }

        .crystal-icon {
            font-size: 26px;
            filter: drop-shadow(0 0 4px gold);
        }

        .crystal-count {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .game-title {
            font-weight: 600;
            font-size: 14px;
            background: rgba(255,215,150,0.2);
            padding: 5px 14px;
            border-radius: 50px;
            color: #ffeaC0;
            letter-spacing: 1px;
        }

        /* СЕТКА ПЕРСОНАЖЕЙ (горизонтальный скролл на телефоне) */
        .char-scroll {
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding-bottom: 12px;
            margin-bottom: 16px;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .chars-row {
            display: inline-flex;
            gap: 14px;
            padding: 4px 4px;
        }

        .character-card {
            width: 150px;
            background: linear-gradient(145deg, #1a1f2e, #111624);
            border-radius: 28px;
            padding: 16px 8px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255, 190, 80, 0.3);
            backdrop-filter: blur(4px);
            white-space: normal;
            box-shadow: 0 10px 18px -5px black;
        }

        .character-card:active {
            transform: scale(0.96);
        }

        .character-card.active {
            border: 2px solid #ffbf69;
            background: linear-gradient(145deg, #2a2f4a, #1b203b);
            box-shadow: 0 0 16px rgba(255, 180, 60, 0.7);
        }

        .char-avatar {
            font-size: 56px;
            filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.6));
            margin-bottom: 8px;
        }

        .char-name {
            font-size: 18px;
            font-weight: bold;
            color: #fbe9c3;
        }

        .char-type {
            font-size: 11px;
            background: #2b2f44;
            display: inline-block;
            padding: 3px 12px;
            border-radius: 40px;
            color: #cfc5a8;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ОБЛАСТЬ ЧАТА */
        .chat-section {
            margin-top: 8px;
            padding: 18px 14px;
        }

        .active-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px dashed #ffcf7a40;
        }

        .active-avatar {
            font-size: 44px;
            background: rgba(0,0,0,0.4);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(4px);
        }

        .active-name {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(120deg, #fff2df, #ffdaa0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .active-tag {
            font-size: 12px;
            color: #bbaF8a;
        }

        /* ОКНО СООБЩЕНИЙ */
        .messages-window {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 32px;
            padding: 14px;
            height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 26px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeInUp 0.2s ease;
        }

        .player-message {
            align-self: flex-end;
            background: linear-gradient(115deg, #4a3f7c, #2d2b5e);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(35, 38, 55, 0.9);
            border-left: 3px solid #f7b05e;
            color: #faeedb;
            border-bottom-left-radius: 6px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ИНПУТ + КНОПКА */
        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #0c111c;
            border: 1px solid #5e5470;
            border-radius: 40px;
            padding: 14px 18px;
            color: #fffbee;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: #ffbb6e;
            box-shadow: 0 0 10px #ffa04d55;
        }

        .send-button {
            background: radial-gradient(circle at 30% 10%, #f5b85b, #c9782c);
            border: none;
            border-radius: 60px;
            width: 52px;
            height: 52px;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .send-button:active {
            transform: scale(0.92);
        }

        .cost-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 12px;
            font-size: 11px;
            color: #cfbf97;
        }

        /* ТОСТ */
        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #da4747e6;
            color: white;
            padding: 12px 26px;
            border-radius: 60px;
            font-weight: bold;
            backdrop-filter: blur(12px);
            transition: 0.2s;
            opacity: 0;
            z-index: 1000;
            font-size: 14px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* SCROLLBAR */
        .messages-window::-webkit-scrollbar {
            width: 4px;
        }
        .messages-window::-webkit-scrollbar-track {
            background: #1f293d;
            border-radius: 10px;
        }
        .messages-window::-webkit-scrollbar-thumb {
            background: #ffb459;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- Верхняя панель кристалов -->
    <div class="crystal-header glass-card">
        <div class="crystal-badge">
            <span class="crystal-icon">💎</span>
            <span class="crystal-count" id="crystalCounter">100</span>
        </div>
        <div class="game-title">✨ 10 ИИ-тяночек ✨</div>
    </div>

    <!-- Горизонтальный список персонажей (идеально для телефона) -->
    <div class="char-scroll">
        <div class="chars-row" id="charactersList"></div>
    </div>

    <!-- Чат с активной девушкой -->
    <div class="glass-card chat-section">
        <div class="active-info">
            <div class="active-avatar" id="activeAvatar">🌸</div>
            <div>
                <div class="active-name" id="activeName">Выбери тяночку</div>
                <div class="active-tag" id="activeType">💬 нажми на иконку</div>
            </div>
        </div>

        <div class="messages-window" id="chatMessages">
            <div class="message ai-message">✨ Привет! Нажми на любую девушку, отправляй сообщения (1 💎 за сообщение). Каждая тяночка уникальна!</div>
        </div>

        <div class="input-group">
            <input type="text" id="messageInput" class="chat-input" placeholder="Напиши ей... 💬" autocomplete="off">
            <button id="sendMsgBtn" class="send-button">➤</button>
        </div>
        <div class="cost-footer">
            <span>⭐ 1 кристалл = 1 сообщение · нейросеть-личность</span>
        </div>
    </div>
</div>
<div id="globalToast" class="toast-notify">⚠️ Недостаточно кристаллов</div>

<script>
    // ======================= 10 ТЯНОЧЕК С ХАРАКТЕРАМИ =======================
    const GIRLS = [
        { id: 0, name: "Миюки", type: "Яндере-айдол", avatar: "🎤", personality: "ревнивая, страстная, обожает только тебя. Говорит томно, но иногда угрожает шутливо. Не терпит, когда смотрят на других." },
        { id: 1, name: "Хината", type: "Няшная сестрёнка", avatar: "🍡", personality: "заботливая, нежная, любит угощать. Всегда поддержит и напоит чаем." },
        { id: 2, name: "Лилит", type: "Готичный сарказм", avatar: "🦇", personality: "мрачная, остроумная, циничная, но в душе романтик. Любит чёрный юмор." },
        { id: 3, name: "Розали", type: "Аристократка", avatar: "🌹", personality: "изящная, использует старинные фразы, ценит кристаллы как драгоценности." },
        { id: 4, name: "Кибэ", type: "Геймерша", avatar: "🎮", personality: "игровой сленг, энергичная, подкалывает. 'Крит', 'фарм', 'имба'." },
        { id: 5, name: "Юки", type: "Цундере-кудере", avatar: "❄️", personality: "сначала холодная и грубая, но со временем теплеет. Скрытно стеснительная." },
        { id: 6, name: "Сакура", type: "Весенняя фея", avatar: "🌸", personality: "мечтательная, поэтичная, говорит о цветах и чудесах." },
        { id: 7, name: "Электра", type: "Панк-энергия", avatar: "⚡", personality: "громкая, дерзкая, быстрая, любит экшн и кристаллы." },
        { id: 8, name: "Селин", type: "Мистическая гадалка", avatar: "🔮", personality: "говорит загадками, шепотом, связывает кристаллы с судьбой." },
        { id: 9, name: "Луна", type: "Лунная принцесса", avatar: "🌙", personality: "тихая, меланхоличная, чувствительная, говорит о звёздах." }
    ];

    let crystals = 100;
    let activeId = 0;        // активная девушка (по умолчанию Миюки)
    let messagesStore = {};   // { id: [{text, sender}] }

    // DOM эл-ты
    const crystalsSpan = document.getElementById("crystalCounter");
    const chatContainer = document.getElementById("chatMessages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendMsgBtn");
    const activeAvatarSpan = document.getElementById("activeAvatar");
    const activeNameSpan = document.getElementById("activeName");
    const activeTypeSpan = document.getElementById("activeType");

    // Вспомогательные функции
    function updateCrystalsUI() {
        crystalsSpan.innerText = crystals;
    }

    function showToast(msg) {
        const toast = document.getElementById("globalToast");
        toast.innerText = msg || "⚠️ Недостаточно кристаллов!";
        toast.style.opacity = "1";
        if (window.toastTimer) clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => toast.style.opacity = "0", 1700);
    }

    // Сохранить сообщение в магазин активной девушки
    function pushMessage(text, sender) {
        if (!messagesStore[activeId]) messagesStore[activeId] = [];
        messagesStore[activeId].push({ text, sender });
        renderChatHistory();
    }

    // Отобразить историю текущего персонажа
    function renderChatHistory() {
        const history = messagesStore[activeId] || [];
        if (history.length === 0) {
            // Приветственное сообщение, если чат пуст
            const girl = GIRLS.find(g => g.id === activeId);
            const greeting = `💎 Привет, я ${girl.name} (${girl.type})! Напиши что-нибудь, каждый ответ уникален ✨`;
            messagesStore[activeId] = [{ text: greeting, sender: "ai" }];
        }
        const fullHistory = messagesStore[activeId];
        chatContainer.innerHTML = "";
        for (let msg of fullHistory) {
            const div = document.createElement("div");
            div.className = `message ${msg.sender === "player" ? "player-message" : "ai-message"}`;
            div.innerText = msg.text;
            chatContainer.appendChild(div);
        }
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // ======================== ИИ-ГЕНЕРАТОР (ЖИВОЙ, но пока шаблон) ========================
    // ⚠️ ВНИМАНИЕ: здесь мы подготавливаем функцию для подключения бесплатной нейросети!
    // Пока ответы генерируются на основе характера + контекст, но выглядит как настоящий ИИ
    function generateAIPlayerResponse(playerMessage, charId) {
        const girl = GIRLS.find(c => c.id === charId);
        if (!girl) return "...";
        const pers = girl.personality;
        const name = girl.name;
        const lowerMsg = playerMessage.toLowerCase();

        // интеллектуальные живые ответы, зависящие от типажа
        if (lowerMsg.includes("привет") || lowerMsg.includes("здарова") || lowerMsg.includes("hi")) {
            if (charId === 0) return `${name}: (мило) О, заглянул на огонёк... надеюсь, только ко мне? 💜`;
            if (charId === 1) return `${name}: Ура, привет! Будешь печеньки? 🍪`;
            if (charId === 2) return `${name}: Хм... и тебе не болеть. Что привело? 🦇`;
            if (charId === 5) return `${name}: М-м... привет. (краснеет) ... не жди, что я растаю.`;
            return `${name}: Приветик! Твои кристаллы звенят в такт ✨`;
        }
        if (lowerMsg.includes("как дела") || lowerMsg.includes("как ты")) {
            return `${name}: У меня всё искрится ✨ А у тебя? Расскажи что-нибудь!`;
        }
        if (lowerMsg.includes("люблю") || lowerMsg.includes("обожаю")) {
            if (charId === 0) return `${name}: Ах... повторяй это ещё и ещё. Но если вру... сама знаешь 💢`;
            if (charId === 5) return `${name}: Д-дурак! С чего ты взял? (но приятно) 😳`;
            return `${name}: Ой... я тоже... это так мило с твоей стороны! 🌸`;
        }
        if (lowerMsg.includes("кристалл") || lowerMsg.includes("кристалы")) {
            return `${name}: Кристаллы — это наша магия. Каждое сообщение — как драгоценный камень. Трать с умом ✨`;
        }
        // универсальные personality-ответы
        const personalityMap = {
            0: `${name}: (томно) Моё сердечко кристаллизуется от твоих слов.. не бросай меня.`,
            1: `${name}: Ммм, я тебя слышу. Ты такой тёплый. Хочешь плед?`,
            2: `${name}: Даже не знаю, что ответить... Но звучит интригующе. 🦇`,
            3: `${name}: О, ваши речи словно старинная поэма... восхитительно. 🌹`,
            4: `${name}: Ага, понял, красава! Давай ещё пофармим диалог. +rep`,
            5: `${name}: Хм... ты странный... (шепотом) но мне нравится. ❄️`,
            6: `${name}: Твои слова словно лепестки сакуры, они кружат в моём сердце.`,
            7: `${name}: Йоу! Люблю когда по делу! Погнали дальше! ⚡`,
            8: `${name}: (загадочно) Звёзды шепчут, что наша беседа неслучайна... 🔮`,
            9: `${name}: Твой голос как отражение луны в озере... так спокойно. 🌙`
        };
        return personalityMap[charId] || `${name}: (нежно) Мне интересно с тобой, правда. 💎`;
    }

    // ОСНОВНОЙ МЕТОД ОТПРАВКИ сообщения (тратит кристалл + генерация)
    async function sendMessageToAI() {
        const msg = messageInput.value.trim();
        if (!msg) return;
        if (crystals < 1) {
            showToast("❄️ Не хватает кристаллов! Каждое сообщение стоит 1💎");
            return;
        }
        // списываем кристалл
        crystals--;
        updateCrystalsUI();

        // добавить сообщение игрока
        pushMessage(msg, "player");
        messageInput.value = "";

        // ⚡⚡⚡ ЗДЕСЬ БУДЕТ НАСТОЯЩАЯ НЕЙРОСЕТЬ ⚡⚡⚡
        // Пока вызываем умный генератор, но он легко заменяется на API (бесплатно)
        // Пример: можно подключить MegaNova AI / OpenRouter / Gemini (бесплатные ключи)
        // Ниже код, который имитирует асинхронный ответ нейросети.
        // Для реальной нейронки надо заменить функцию generateAIPlayerResponse на fetch запрос.
        
        // имитация задержки ответа (как у нейросети)
        const replyText = generateAIPlayerResponse(msg, activeId);
        setTimeout(() => {
            pushMessage(replyText, "ai");
        }, 260);
    }

    // Смена активной девушки
    function setActiveGirl(id) {
        if (activeId === id) return;
        activeId = id;
        const current = GIRLS.find(g => g.id === activeId);
        activeAvatarSpan.innerText = current.avatar;
        activeNameSpan.innerText = current.name;
        activeTypeSpan.innerText = `${current.type} 💬`;
        
        // инициализация истории сообщений, если пусто
        if (!messagesStore[activeId] || messagesStore[activeId].length === 0) {
            const greetingMsg = `✨ Привет, я ${current.name} ✨ (${current.type}). Трать кристаллы с умом, обещаю живые ответы! 💎`;
            messagesStore[activeId] = [{ text: greetingMsg, sender: "ai" }];
        }
        renderChatHistory();
        
        // обновить активную карточку
        document.querySelectorAll('.character-card').forEach(card => {
            const girlId = parseInt(card.getAttribute('data-id'));
            if (girlId === id) card.classList.add('active');
            else card.classList.remove('active');
        });
    }

    // отрисовать карточки (горизонтальный скролл)
    function renderGirlCards() {
        const container = document.getElementById("charactersList");
        container.innerHTML = "";
        GIRLS.forEach(girl => {
            const card = document.createElement("div");
            card.className = `character-card ${activeId === girl.id ? 'active' : ''}`;
            card.setAttribute("data-id", girl.id);
            card.innerHTML = `
                <div class="char-avatar">${girl.avatar}</div>
                <div class="char-name">${girl.name}</div>
                <div class="char-type">${girl.type}</div>
                <div style="font-size:10px; margin-top:8px;">✨ 1💎</div>
            `;
            card.addEventListener("click", () => setActiveGirl(girl.id));
            container.appendChild(card);
        });
    }

    // Инициализация хранилища
    function initGame() {
        for (let g of GIRLS) {
            if (!messagesStore[g.id]) messagesStore[g.id] = [];
        }
        // активная по умолчанию 0
        activeId = 0;
        const def = GIRLS[0];
        if (messagesStore[0].length === 0) {
            messagesStore[0] = [{ text: `🌸 Привет, я ${def.name} (${def.type}). Напиши что-нибудь, почувствуй магию кристаллов! 💎`, sender: "ai" }];
        }
        renderGirlCards();
        setActiveGirl(0);
        updateCrystalsUI();

        sendBtn.addEventListener("click", sendMessageToAI);
        messageInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessageToAI();
        });
    }

    initGame();
</script>
</body>
</html>
