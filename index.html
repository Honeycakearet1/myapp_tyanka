<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>✨ КристалTalk · AI-тяночки как в Character.AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0b10;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Главный лэйаут в стиле C.AI — чат занимает всё, а сверху плавающие элементы */
        .cai-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        /* Верхняя планка с кристаллами и меню персонажей */
        .top-bar {
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 210, 110, 0.2);
            z-index: 20;
        }

        .crystal-pill {
            background: linear-gradient(135deg, #1e1f2c, #121520);
            padding: 6px 16px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 190, 70, 0.4);
            box-shadow: 0 0 8px rgba(255, 160, 0, 0.2);
        }

        .crystal-pill span:first-child {
            font-size: 22px;
        }

        .crystal-pill span:last-child {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFAE42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .char-selector-btn {
            background: rgba(255, 215, 140, 0.12);
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 13px;
            font-weight: 500;
            color: #ffdfb0;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.1s;
        }

        .char-selector-btn:active {
            background: rgba(255, 215, 140, 0.3);
        }

        /* ОСНОВНАЯ ЗОНА ЧАТА — ЦЕНТР ПЕРСОНАЖА */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 20px 16px 20px 16px;
            position: relative;
        }

        /* АВАТАР + СТАТУС (в стиле Character.AI) */
        .character-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 24px;
            animation: floatIn 0.5s ease;
        }

        .avatar-glow {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, rgba(255,180,80,0.2), transparent 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }

        .avatar-big {
            font-size: 80px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.6));
            transition: 0.2s;
        }

        .char-name-big {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(120deg, #FFF3DF, #FFD89C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .char-type-badge {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            color: #e7cf9e;
            margin-top: 6px;
            border: 0.5px solid #ffcf7a40;
        }

        /* ОКНО СООБЩЕНИЙ КАК В CHARACTER.AI — пузыри */
        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .msg-bubble {
            max-width: 90%;
            padding: 12px 18px;
            border-radius: 28px;
            font-size: 15px;
            line-height: 1.45;
            animation: fadeSlide 0.2s ease;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(115deg, #3f3b6e, #2a2650);
            color: white;
            border-bottom-right-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(28, 32, 48, 0.9);
            border-bottom-left-radius: 8px;
            border-left: 3px solid #ffbc6e;
            color: #f2e5d2;
        }

        /* индикатор печати */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(28, 32, 48, 0.8);
            padding: 10px 18px;
            border-radius: 28px;
            width: fit-content;
            margin-top: 4px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #ffc285;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8);}
            50% { opacity: 1; transform: scale(1.2);}
        }

        /* НИЖНЯЯ ПАНЕЛЬ (ввод) */
        .input-panel {
            background: rgba(12, 16, 24, 0.9);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255,200,100,0.2);
            padding: 12px 18px 20px 18px;
            border-radius: 28px 28px 0 0;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.45);
            border-radius: 48px;
            padding: 4px 6px 4px 20px;
            border: 1px solid #796e4e;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #ffbc6e;
            box-shadow: 0 0 8px #ffad5c55;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 0;
            color: #fff6e8;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .send-icon {
            background: linear-gradient(145deg, #f5b85b, #c26f2a);
            width: 46px;
            height: 46px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 2px 8px black;
        }

        .send-icon:active {
            transform: scale(0.92);
        }

        /* СМЕНА ПЕРСОНАЖА (нижний лист, как модалка, в стиле C.AI) */
        .char-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 10, 18, 0.96);
            backdrop-filter: blur(32px);
            border-radius: 32px 32px 0 0;
            transform: translateY(100%);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 100;
            padding: 20px 16px 32px;
            border-top: 1px solid #ffcf7a40;
            max-height: 70vh;
            overflow-y: auto;
        }

        .char-drawer.open {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f7e1b0;
            font-size: 18px;
        }

        .close-drawer {
            font-size: 28px;
            cursor: pointer;
        }

        .drawer-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .drawer-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(30, 34, 54, 0.6);
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #6b5e4433;
            transition: 0.05s linear;
            cursor: pointer;
        }

        .drawer-item:active {
            background: #3e3b5e;
        }

        .drawer-avatar {
            font-size: 42px;
        }

        .drawer-info {
            flex: 1;
        }

        .drawer-name {
            font-weight: bold;
            font-size: 18px;
            color: #f6e5cf;
        }

        .drawer-type {
            font-size: 11px;
            color: #cbbd92;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @keyframes floatIn {
            from { opacity: 0; transform: scale(0.96);}
            to { opacity: 1; transform: scale(1);}
        }

        .chat-main::-webkit-scrollbar {
            width: 3px;
        }
        .chat-main::-webkit-scrollbar-track {
            background: #202230;
        }
        .chat-main::-webkit-scrollbar-thumb {
            background: #f5b85b;
        }
    </style>
</head>
<body>
<div class="cai-container">
    <div class="top-bar">
        <div class="crystal-pill">
            <span>💎</span>
            <span id="crystalValue">100</span>
        </div>
        <div class="char-selector-btn" id="openDrawerBtn">
            <span>🎭</span> <span>Сменить тяночку</span>
        </div>
    </div>

    <div class="chat-main" id="chatMain">
        <!-- профайл активной девушки -->
        <div class="character-profile" id="charProfile">
            <div class="avatar-glow"><span class="avatar-big" id="profileAvatar">🎤</span></div>
            <div class="char-name-big" id="profileName">Миюки</div>
            <div class="char-type-badge" id="profileType">Яндере-айдол</div>
        </div>

        <div class="messages-area" id="messagesList">
            <div class="msg-bubble ai-msg">✨ Привет! Я твоя персональная ИИ-тяночка. Каждое сообщение оживает... (1 кристалл). Напиши что-нибудь 💎</div>
        </div>
    </div>

    <div class="input-panel">
        <div class="input-wrapper">
            <input type="text" id="chatInputField" class="chat-input" placeholder="Спроси меня о чём угодно..." autocomplete="off">
            <div class="send-icon" id="sendMessageBtn">➤</div>
        </div>
        <div style="font-size: 10px; text-align: center; margin-top: 8px; opacity: 0.6;">💎 1 кристалл · Живой ИИ-характер</div>
    </div>
</div>

<div class="overlay" id="drawerOverlay"></div>
<div class="char-drawer" id="charDrawer">
    <div class="drawer-header">
        <span>✨ Выбери свою тяночку</span>
        <span class="close-drawer" id="closeDrawerBtn">✕</span>
    </div>
    <div class="drawer-grid" id="drawerList"></div>
</div>

<script>
    // 10 девушек с характерами
    const GIRLS = [
        { id: 0, name: "Миюки", type: "Яндере-айдол", avatar: "🎤", personality: "Ревнивая, страстная, обожает только тебя. Говорит томно, но иногда угрожает шутливо." },
        { id: 1, name: "Хината", type: "Няшная сестрёнка", avatar: "🍡", personality: "Заботливая, дарит тепло, любит печеньки и чай. Всегда выслушает." },
        { id: 2, name: "Лилит", type: "Готичный сарказм", avatar: "🦇", personality: "Мрачная, остроумная, циничная, но романтичная внутри." },
        { id: 3, name: "Розали", type: "Аристократка", avatar: "🌹", personality: "Изысканная, говорит вежливо, ценит кристаллы и эстетику." },
        { id: 4, name: "Кибэ", type: "Геймерша", avatar: "🎮", personality: "Энергичная, любит игры, сленг: крит, фарм, имба." },
        { id: 5, name: "Юки", type: "Цундере", avatar: "❄️", personality: "Снаружи холодная и грубоватая, но внутри стеснительная." },
        { id: 6, name: "Сакура", type: "Фея весны", avatar: "🌸", personality: "Поэтичная, говорит о чудесах, нежная." },
        { id: 7, name: "Электра", type: "Панк-энергия", avatar: "⚡", personality: "Дерзкая, громкая, любит скорость и риск." },
        { id: 8, name: "Селин", type: "Мистическая", avatar: "🔮", personality: "Говорит загадками, связывает судьбу с кристаллами." },
        { id: 9, name: "Луна", type: "Лунная принцесса", avatar: "🌙", personality: "Меланхоличная, тихая, чуткая, говорит о звёздах." }
    ];

    let crystals = 100;
    let activeId = 0;
    let messagesStore = {};
    let isTyping = false;

    // DOM
    const crystalSpan = document.getElementById("crystalValue");
    const profileAvatar = document.getElementById("profileAvatar");
    const profileName = document.getElementById("profileName");
    const profileType = document.getElementById("profileType");
    const messagesContainer = document.getElementById("messagesList");
    const inputField = document.getElementById("chatInputField");
    const sendBtn = document.getElementById("sendMessageBtn");
    const drawerOverlay = document.getElementById("drawerOverlay");
    const charDrawer = document.getElementById("charDrawer");
    const openDrawerBtn = document.getElementById("openDrawerBtn");
    const closeDrawerBtn = document.getElementById("closeDrawerBtn");
    const drawerList = document.getElementById("drawerList");

    function updateCrystalsUI() { crystalSpan.innerText = crystals; }

    // Сохранить сообщение в store
    function pushMessage(text, sender) {
        if (!messagesStore[activeId]) messagesStore[activeId] = [];
        messagesStore[activeId].push({ text, sender });
        renderMessages();
    }

    function showTypingIndicator(show) {
        const existing = document.querySelector('.typing-indicator');
        if (show && !existing) {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.id = 'typingDiv';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div><span style="margin-left:6px;font-size:12px;">тяночка печатает...</span>';
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        } else if (!show && existing) existing.remove();
    }

    // Генерация ИИ ответа с учётом контекста (симуляция нейронки, готова под free API) 
    function generateAIResponse(playerMsg, charId) {
        const girl = GIRLS.find(g => g.id === charId);
        if (!girl) return "...";
        const name = girl.name;
        const lowerMsg = playerMsg.toLowerCase();
        // Динамика, похожая на character.ai
        if (lowerMsg.includes("привет") || lowerMsg.includes("здравствуй")) {
            if (charId === 0) return `${name}: (сжимая кулачки) Ты пришёл... только ко мне, да? Надеюсь, ты ни с кем там не флиртовал... 💜`;
            if (charId === 5) return `${name}: Хм.. привет. (отводит взгляд) Я не особо рада... но ладно.`;
            return `${name}: О, привет! Как твои кристаллы, сверкают? ✨`;
        }
        if (lowerMsg.includes("люблю") || lowerMsg.includes("обожаю")) {
            if (charId === 0) return `${name}: Ах... скажи это ещё раз. Я запомню. И никому другому не говори... 🔪💕`;
            if (charId === 5) return `${name}: Д-дурак! (краснеет) ...но приятно слышать.`;
            return `${name}: Ой... я тоже.. очень тронута 🌸`;
        }
        if (lowerMsg.includes("кристалл")) {
            return `${name}: Кристаллы — это наша магия, каждое слово приближает нас. Цени их ✨`;
        }
        // Personality based
        const personalityMap = {
            0: `${name}: (вздыхая) Моё сердце бьётся быстрее, когда ты рядом. Не бросай меня.`,
            1: `${name}: Ммм, у тебя такой тёплый голос. Хочешь плед и печеньки? 🍪`,
            2: `${name}: Ха.. даже не знаю. Твои слова звучат мрачно и интересно. 🦇`,
            3: `${name}: О, вы говорите словно бриллиантовая россыпь... прекрасно. 🌹`,
            4: `${name}: Ага, красава! Давай ещё пофармим диалог, это имба! +rep 🎮`,
            5: `${name}: Ты странный... (тихо) но мне, кажется, нравится. ❄️`,
            6: `${name}: Твои слова словно лепестки вишни. Как поэтично...🌸`,
            7: `${name}: Йо! С тобой весело, погнали дальше, жги! ⚡`,
            8: `${name}: (загадочно) Звёзды переплетают наши судьбы... 🔮`,
            9: `${name}: Твой голос как отражение луны в спокойной воде... 🌙`
        };
        return personalityMap[charId] || `${name}: (улыбается) Мне нравится с тобой общаться, правда. 💎`;
    }

    async function renderMessages() {
        const history = messagesStore[activeId] || [];
        if (history.length === 0) {
            const girl = GIRLS.find(g => g.id === activeId);
            const greet = `✨ Привет, я ${girl.name} (${girl.type})! Кристаллы делают нашу связь реальной. Напиши что-нибудь ✨`;
            messagesStore[activeId] = [{ text: greet, sender: "ai" }];
        }
        const fullHistory = messagesStore[activeId];
        messagesContainer.innerHTML = "";
        for (let msg of fullHistory) {
            const bubble = document.createElement("div");
            bubble.className = `msg-bubble ${msg.sender === "player" ? "user-msg" : "ai-msg"}`;
            bubble.innerText = msg.text;
            messagesContainer.appendChild(bubble);
        }
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    async function sendMessage() {
        const msg = inputField.value.trim();
        if (!msg) return;
        if (crystals < 1) {
            const toast = document.createElement("div");
            toast.innerText = "❄️ Не хватает кристаллов!";
            toast.style.position = "fixed";
            toast.style.bottom = "90px";
            toast.style.left = "50%";
            toast.style.transform = "translateX(-50%)";
            toast.style.background = "#bc3f3f";
            toast.style.padding = "8px 20px";
            toast.style.borderRadius = "50px";
            toast.style.zIndex = "200";
            toast.style.fontWeight = "bold";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
            return;
        }
        crystals--;
        updateCrystalsUI();
        pushMessage(msg, "player");
        inputField.value = "";
        
        showTypingIndicator(true);
        // Имитация задержки нейросети
        const reply = generateAIResponse(msg, activeId);
        setTimeout(() => {
            showTypingIndicator(false);
            pushMessage(reply, "ai");
        }, 420);
    }

    function setActiveGirl(id) {
        if (activeId === id) return;
        activeId = id;
        const girl = GIRLS.find(g => g.id === id);
        profileAvatar.innerText = girl.avatar;
        profileName.innerText = girl.name;
        profileType.innerText = girl.type;
        if (!messagesStore[activeId] || messagesStore[activeId].length === 0) {
            messagesStore[activeId] = [{ text: `💬 Привет, я ${girl.name}. Рада познакомиться! Трать кристаллы с умом ✨`, sender: "ai" }];
        }
        renderMessages();
        closeDrawer();
    }

    function renderDrawer() {
        drawerList.innerHTML = "";
        GIRLS.forEach(g => {
            const item = document.createElement("div");
            item.className = "drawer-item";
            item.innerHTML = `<div class="drawer-avatar">${g.avatar}</div>
                              <div class="drawer-info">
                                 <div class="drawer-name">${g.name}</div>
                                 <div class="drawer-type">${g.type}</div>
                              </div>`;
            item.addEventListener("click", () => setActiveGirl(g.id));
            drawerList.appendChild(item);
        });
    }

    function openDrawer() {
        charDrawer.classList.add("open");
        drawerOverlay.classList.add("active");
    }
    function closeDrawer() {
        charDrawer.classList.remove("open");
        drawerOverlay.classList.remove("active");
    }

    function init() {
        for (let g of GIRLS) if (!messagesStore[g.id]) messagesStore[g.id] = [];
        setActiveGirl(0);
        updateCrystalsUI();
        renderDrawer();
        sendBtn.addEventListener("click", sendMessage);
        inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
        openDrawerBtn.addEventListener("click", openDrawer);
        closeDrawerBtn.addEventListener("click", closeDrawer);
        drawerOverlay.addEventListener("click", closeDrawer);
    }

    init();
</script>
</body>
</html>
